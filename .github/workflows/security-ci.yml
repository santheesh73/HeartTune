name: Security CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit high and critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Security scan
        run: npx --yes semgrep ci --config auto
