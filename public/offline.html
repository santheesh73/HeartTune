<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e11d48" />
    <title>HeartTune Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(225, 29, 72, 0.22), transparent 42%),
          linear-gradient(180deg, #111 0%, #000 100%);
        color: #fff;
      }

      main {
        width: min(100%, 480px);
        padding: 32px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(18, 18, 18, 0.92);
        text-align: center;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 2.8rem);
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HeartTune</h1>
      <p>You're offline right now. Cached pages and assets are still available, and the app will reconnect automatically when your network returns.</p>
    </main>
  </body>
  </html>
